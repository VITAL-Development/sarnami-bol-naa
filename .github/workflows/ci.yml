name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests (JSON output)
        id: run_tests
        run: npm run test:ci
        continue-on-error: true

      - name: Build test report
        if: github.event_name == 'pull_request'
        id: report
        run: |
          node - <<'EOF'
          const fs = require("fs");
          const raw = fs.readFileSync("test-results.json", "utf8");
          const data = JSON.parse(raw);

          const totalFiles   = data.numTotalTestSuites ?? 0;
          const passedFiles  = data.numPassedTestSuites ?? 0;
          const failedFiles  = data.numFailedTestSuites ?? 0;
          const totalTests   = data.numTotalTests ?? 0;
          const passedTests  = data.numPassedTests ?? 0;
          const failedTests  = data.numFailedTests ?? 0;
          const duration     = ((data.testResults ?? []).reduce((s, f) => s + (f.endTime - f.startTime), 0) / 1000).toFixed(2);

          const icon = failedTests === 0 ? "✅" : "❌";
          const statusLine = failedTests === 0
            ? `All **${totalTests}** tests passed.`
            : `**${failedTests}** of **${totalTests}** tests failed.`;

          // Collect failed test names for the report
          const failures = [];
          for (const suite of (data.testResults ?? [])) {
            for (const t of (suite.testResults ?? [])) {
              if (t.status === "failed") {
                failures.push(`- \`${suite.testFilePath.replace(process.cwd() + "/", "")}\` › ${t.ancestorTitles.join(" › ")} › **${t.title}**\n  ${(t.failureMessages ?? []).join("\n  ")}`);
              }
            }
          }

          let body = `## ${icon} Test Report\n\n`;
          body += `${statusLine}\n\n`;
          body += `| | Count |\n|---|---|\n`;
          body += `| Test suites | ${passedFiles} passed, ${failedFiles} failed, ${totalFiles} total |\n`;
          body += `| Tests | ${passedTests} passed, ${failedTests} failed, ${totalTests} total |\n`;
          body += `| Duration | ${duration}s |\n`;

          if (failures.length > 0) {
            body += `\n### Failed tests\n\n${failures.join("\n\n")}\n`;
          }

          body += `\n<sub>Generated by [CI workflow](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})</sub>`;

          fs.writeFileSync("pr-comment.md", body);
          EOF

      - name: Post test report as PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: test-report
          path: pr-comment.md

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
