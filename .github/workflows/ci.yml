name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

# ── Shared step fragments ────────────────────────────────────────────────────
# Each job restores node_modules from the cache seeded by the install job.
# The cache key is the package-lock.json hash, so a lockfile change triggers
# a fresh npm ci in the install job and propagates to all downstream jobs.

jobs:
  # ── Detect functional (app) vs content-only changes ─────────────────────────
  # Content data (vocab/unit text) doesn't affect app behavior, so pure content
  # PRs skip unit-tests entirely rather than paying for a full test run.
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter-src.outputs.app == 'true' || steps.filter-config.outputs.app == 'true' }}
    steps:
      - uses: actions/checkout@v4
      # Two separate filter steps because the negated (!...) exclusions below
      # need predicate-quantifier: every (a file must match src/** AND not
      # match either excluded dir) — mixing that with the unrelated root
      # config patterns in one 'every' rule would mean no single file could
      # ever satisfy all of them at once, so root config changes must live in
      # their own default ('some' = OR) filter instead.
      - uses: dorny/paths-filter@v3
        id: filter-src
        with:
          predicate-quantifier: every
          filters: |
            app:
              - 'src/**'
              - '!src/data/vocab/**'
              - '!src/data/units/**'
      - uses: dorny/paths-filter@v3
        id: filter-config
        with:
          filters: |
            app:
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig*.json'

  # ── 0. Seed npm cache ───────────────────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Cache node_modules
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Install
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps
      - name: Install Playwright OS deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

  # ── 1. TypeScript typecheck ─────────────────────────────────────────────────
  typecheck:
    name: "Check 1: TypeScript typecheck"
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Typecheck
        id: tc
        run: npm run typecheck
        continue-on-error: true
      - name: Write result
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('result-typecheck.json', JSON.stringify({
              job: 'typecheck',
              label: 'TypeScript typecheck',
              passed: '${{ steps.tc.outcome }}' === 'success',
              detail: ''
            }));
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-typecheck
          path: result-typecheck.json
      - if: steps.tc.outcome == 'failure'
        run: exit 1

  # ── 2. Unit tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: "Check 2: Unit tests"
    needs: [install, changes]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - name: Run tests
        id: tests
        run: npm run test:ci
        continue-on-error: true
      - name: Write result
        run: |
          node -e "
            const fs = require('fs');
            let detail = '';
            try {
              const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
              detail = r.numPassedTests + '/' + r.numTotalTests + ' tests passed';
            } catch (_) {}
            fs.writeFileSync('result-unit-tests.json', JSON.stringify({
              job: 'unit-tests',
              label: 'Unit tests (61)',
              passed: '${{ steps.tests.outcome }}' === 'success',
              detail
            }));
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-unit-tests
          path: |
            result-unit-tests.json
            test-results.json
      - if: steps.tests.outcome == 'failure'
        run: exit 1

  # ── Build (gate for visual checks) ─────────────────────────────────────────
  build:
    name: Build
    needs: [typecheck, unit-tests]
    # unit-tests is skipped (not failed) on content-only changes; treat that
    # the same as success so the visual chain still runs.
    if: |
      always() &&
      needs.typecheck.result == 'success' &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Helper: shared Playwright setup steps (referenced inline below) ─────────
  # Each visual job: restore node_modules + dist, install Chromium, run test

  # ── 3. Visual: Home HUD icons ──────────────────────────────────────────────
  visual-home:
    name: "Check 3: Home HUD icons"
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install-deps chromium
      - name: Run test
        id: pw
        run: npx playwright test e2e/home.spec.ts
        continue-on-error: true
      - name: Write result
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('result-visual-home.json', JSON.stringify({
              job: 'visual-home',
              label: 'Home: gold XP star, streak fire, red hearts, green lesson nodes',
              passed: '${{ steps.pw.outcome }}' === 'success',
              detail: ''
            }));
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-visual-home
          path: result-visual-home.json
      - if: steps.pw.outcome == 'failure'
        run: exit 1

  # ── 4. Visual: Lesson node states ─────────────────────────────────────────
  visual-lesson-node:
    name: "Check 4: Lesson node states"
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install-deps chromium
      - name: Run test
        id: pw
        run: npx playwright test e2e/lesson-node.spec.ts
        continue-on-error: true
      - name: Write result
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('result-visual-lesson-node.json', JSON.stringify({
              job: 'visual-lesson-node',
              label: 'Lesson node: FA lock icon (locked), gold stars (completed)',
              passed: '${{ steps.pw.outcome }}' === 'success',
              detail: ''
            }));
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-visual-lesson-node
          path: result-visual-lesson-node.json
      - if: steps.pw.outcome == 'failure'
        run: exit 1

  # ── 5. Visual: Lesson summary ──────────────────────────────────────────────
  visual-lesson-summary:
    name: "Check 5: Lesson summary icons"
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install-deps chromium
      - name: Run test
        id: pw
        run: npx playwright test e2e/lesson-summary.spec.ts
        continue-on-error: true
      - name: Write result
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('result-visual-lesson-summary.json', JSON.stringify({
              job: 'visual-lesson-summary',
              label: 'Lesson summary: FA circle-check (pass) / heart-crack (fail) — no emoji',
              passed: '${{ steps.pw.outcome }}' === 'success',
              detail: ''
            }));
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-visual-lesson-summary
          path: result-visual-lesson-summary.json
      - if: steps.pw.outcome == 'failure'
        run: exit 1

  # ── 6. Visual: Bottom nav ─────────────────────────────────────────────────
  visual-nav:
    name: "Check 6: Bottom nav icons"
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install-deps chromium
      - name: Run test
        id: pw
        run: npx playwright test e2e/nav.spec.ts
        continue-on-error: true
      - name: Write result
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('result-visual-nav.json', JSON.stringify({
              job: 'visual-nav',
              label: 'Bottom nav: FA route/rotate/user icons, active link forest-600',
              passed: '${{ steps.pw.outcome }}' === 'success',
              detail: ''
            }));
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-visual-nav
          path: result-visual-nav.json
      - if: steps.pw.outcome == 'failure'
        run: exit 1

  # ── 7. Visual: Profile badges ─────────────────────────────────────────────
  visual-profile:
    name: "Check 7: Profile badge icons"
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install-deps chromium
      - name: Run test
        id: pw
        run: npx playwright test e2e/profile.spec.ts
        continue-on-error: true
      - name: Write result
        if: always()
        run: |
          node -e "
            const fs = require('fs');
            fs.writeFileSync('result-visual-profile.json', JSON.stringify({
              job: 'visual-profile',
              label: 'Profile: FA badge icons, no emoji in main',
              passed: '${{ steps.pw.outcome }}' === 'success',
              detail: ''
            }));
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: result-visual-profile
          path: result-visual-profile.json
      - if: steps.pw.outcome == 'failure'
        run: exit 1

  # ── Report: aggregate all results ─────────────────────────────────────────
  report:
    name: Design test report
    needs:
      - typecheck
      - unit-tests
      - visual-home
      - visual-lesson-node
      - visual-lesson-summary
      - visual-nav
      - visual-profile
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
          path: results/
      - name: Generate report
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            const ORDER = [
              'typecheck',
              'unit-tests',
              'visual-home',
              'visual-lesson-node',
              'visual-lesson-summary',
              'visual-nav',
              'visual-profile',
            ];

            // ── Check summary table ──────────────────────────────────────────
            const files = fs.readdirSync('results/').filter(f => f.endsWith('.json') && !f.includes('test-results'));
            const results = files.map(f => JSON.parse(fs.readFileSync(path.join('results', f), 'utf8')));
            results.sort((a, b) => ORDER.indexOf(a.job) - ORDER.indexOf(b.job));

            const allPassed = results.every(r => r.passed);
            const icon = allPassed ? '✅' : '❌';

            let body = '## ' + icon + ' Design Test Report\n\n';
            body += '| # | Check | Status | Detail |\n';
            body += '|---|-------|:------:|--------|\n';
            results.forEach((r, i) => {
              body += '| ' + (i + 1) + ' | ' + r.label + ' | ' + (r.passed ? '✅' : '❌') + ' | ' + (r.detail || '—') + ' |\n';
            });

            // ── Unit test detail table ───────────────────────────────────────
            // Vitest JSON shape: { testResults: [{ name: '/abs/path', assertionResults: [...] }] }
            const trPath = path.join('results', 'test-results.json');
            if (fs.existsSync(trPath)) {
              const tr = JSON.parse(fs.readFileSync(trPath, 'utf8'));
              const suites = tr.testResults || [];
              const cwd = suites[0]?.name?.replace(/\/src\/.*/, '') || '';

              const rows = suites.map(suite => {
                const rel = suite.name.replace(cwd + '/', '');
                const assertions = suite.assertionResults || [];
                const passed = assertions.filter(t => t.status === 'passed').length;
                const failed = assertions.filter(t => t.status !== 'passed').length;
                const duration = assertions.reduce((sum, t) => sum + (t.duration || 0), 0);
                const failing = assertions.filter(t => t.status !== 'passed');
                return { rel, passed, failed, total: assertions.length, duration, failing };
              });

              const totals = rows.reduce((acc, r) => ({
                passed: acc.passed + r.passed,
                failed: acc.failed + r.failed,
                total: acc.total + r.total,
                duration: acc.duration + r.duration,
              }), { passed: 0, failed: 0, total: 0, duration: 0 });

              body += '\n### Unit Test Details\n\n';
              body += '| Suite | Passed | Failed | Tests | Duration |\n';
              body += '|-------|-------:|-------:|------:|---------:|\n';
              for (const r of rows) {
                body += '| ' + r.rel + ' | ' + r.passed + ' | ' + r.failed + ' | ' + r.total + ' | ' + Math.round(r.duration) + ' ms |\n';
              }
              body += '| **Total** | **' + totals.passed + '** | **' + totals.failed + '** | **' + totals.total + '** | **' + Math.round(totals.duration) + ' ms** |\n';

              for (const r of rows) {
                if (r.failing.length === 0) continue;
                body += '\n<details>\n<summary>❌ ' + r.rel + ' — ' + r.failing.length + ' failing test(s)</summary>\n\n';
                for (const t of r.failing) {
                  const suiteName = (t.ancestorTitles || []).join(' › ') || '—';
                  body += '- **' + suiteName + ' › ' + t.title + '**\n';
                  for (const msg of (t.failureMessages || [])) {
                    body += '  ```\n  ' + msg.split('\n').join('\n  ') + '\n  ```\n';
                  }
                }
                body += '\n</details>\n';
              }
            }

            const runUrl = process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID;
            body += '\n<sub>Full run: ' + runUrl + '</sub>';

            fs.writeFileSync('pr-report.md', body);
            console.log(body);
          "
      - name: Post report as PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: visual-report
          path: pr-report.md
      - name: Fail if any check failed
        run: |
          node -e "
            const fs = require('fs'), path = require('path');
            const files = fs.readdirSync('results/').filter(f => f.endsWith('.json') && !f.includes('test-results'));
            const results = files.map(f => JSON.parse(fs.readFileSync(path.join('results', f), 'utf8')));
            if (results.some(r => !r.passed)) process.exit(1);
          "
