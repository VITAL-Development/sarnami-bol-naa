name: Build and publish server image

# Packages /server as a Docker image for the Tailscale-hosted backend
# (issue #49). Runs only on pushes to main that touch /server, since that's
# the only thing this image depends on. Published to GitHub Container
# Registry using the built-in GITHUB_TOKEN — no extra secrets needed, see
# server/README.md for the resulting docker pull/run workflow.

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/server-image.yml"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vital-development/sarnami-bol-naa-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          SHA_SHORT="$(git rev-parse --short HEAD)"
          echo "sha_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.tags.outputs.sha_tag }}
            ${{ steps.tags.outputs.latest_tag }}
