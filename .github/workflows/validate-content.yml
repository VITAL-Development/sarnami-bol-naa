name: Validate content contract

on:
  pull_request:
  workflow_dispatch:

jobs:
  fetch-rarelang-server:
    name: fetch rarelang-server tooling
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.resolve.outputs.cache-key }}
    steps:
      # rarelang-server is private, so this needs an authenticated clone —
      # RARELANG_SERVER_TOKEN is a PAT scoped to read-only access on that one
      # repo. Resolve `main`'s current commit first (a single `ls-remote`
      # round-trip, not a clone) so the cache key below only changes when
      # rarelang-server's `main` actually moves — most runs hit cache and
      # skip the clone entirely, and every other job in this workflow
      # restores the same cache instead of cloning again itself, so
      # rarelang-server is fetched at most once per commit, not once per job.
      - name: Resolve rarelang-server main SHA
        id: resolve
        env:
          RARELANG_SERVER_TOKEN: ${{ secrets.RARELANG_SERVER_TOKEN }}
        run: |
          sha=$(git ls-remote "https://x-access-token:${RARELANG_SERVER_TOKEN}@github.com/VITAL-Development/rarelang-server.git" refs/heads/main | cut -f1)
          echo "cache-key=rarelang-server-tooling-${sha}" >> "$GITHUB_OUTPUT"

      - name: Cache rarelang-server tooling
        id: cache
        uses: actions/cache@v4
        with:
          path: rarelang-server-tooling
          key: ${{ steps.resolve.outputs.cache-key }}

      - name: Clone rarelang-server (cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          RARELANG_SERVER_TOKEN: ${{ secrets.RARELANG_SERVER_TOKEN }}
        run: git clone --depth 1 "https://x-access-token:${RARELANG_SERVER_TOKEN}@github.com/VITAL-Development/rarelang-server.git" rarelang-server-tooling

  validate-content:
    name: validate-content (rarelang-server)
    needs: fetch-rarelang-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Restore-only: fetch-rarelang-server already populated this exact key
      # (it ran first, via `needs:`), so this is a same-run cache hit — no
      # network fetch of rarelang-server here at all.
      - name: Restore rarelang-server tooling
        uses: actions/cache/restore@v4
        with:
          path: rarelang-server-tooling
          key: ${{ needs.fetch-rarelang-server.outputs.cache-key }}
          fail-on-cache-miss: true

      # Checks this repo's content/sarnami + settings/sarnami against the
      # "Content repository contract" in rarelang-server's docs/contracts/api-contract.md:
      # required fields/types plus referential integrity of every id-based
      # cross-reference. Tracks rarelang-server's `main` for now since the
      # validator isn't part of a released rarelang-server tag yet; once it
      # ships in one, switch this to that tag the same way deployments pin
      # content tags (see docs/versioning.md) — a moving `main` ref is only
      # acceptable here because it's fetching tooling, not the content shape
      # being validated.
      - name: Validate content contract
        run: node rarelang-server-tooling/scripts/validate-content.mjs .

  validate-transliteration-rules:
    name: validate-transliteration-rules (rarelang-server)
    needs: fetch-rarelang-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cost/time control, same idea as advisory-contract-review's changed-files
      # gate below: settings/sarnami/transliteration-rules.json changes rarely,
      # so most PRs shouldn't pay for a cache restore + node run at all.
      - name: List changed transliteration-rules files
        id: changed
        run: |
          files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- settings/sarnami/transliteration-rules.json)
          if [ -z "$files" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changed.outputs.any == 'true'
        with:
          node-version: "22"

      - name: Restore rarelang-server tooling
        if: steps.changed.outputs.any == 'true'
        uses: actions/cache/restore@v4
        with:
          path: rarelang-server-tooling
          key: ${{ needs.fetch-rarelang-server.outputs.cache-key }}
          fail-on-cache-miss: true

      # Two checks, not one, because neither alone covers the contract in
      # rarelang-server's docs/contracts/schemas/transliteration-rules.schema.json:
      # plain JSON Schema can express per-entry shape (required fields,
      # non-empty strings, no extra properties) but can't express order-
      # dependent rules across sibling array items — the longest-input-first
      # ordering that greedy-longest-match depends on, and the no-duplicate-
      # `input` rule. That schema-shaped half is checked here with a small
      # inline structural check rather than pulling in a JSON-Schema-validator
      # npm dependency for one file. The array-ordering half is checked by
      # calling validateRuleTable() from rarelang-server's src/transliteration.mjs
      # itself — the same function the transliteration engine assumes has
      # already run — so this job is the authoritative source for both halves,
      # matching the schema doc's own instruction that a content repo's CI
      # "should run validateRuleTable, not just schema validation".
      - name: Validate transliteration rule table
        if: steps.changed.outputs.any == 'true'
        run: |
          node -e '
            const fs = require("node:fs");
            const path = "settings/sarnami/transliteration-rules.json";
            const data = JSON.parse(fs.readFileSync(path, "utf-8"));

            // --- (a) Lightweight structural check standing in for the full
            // JSON Schema at rarelang-server-tooling/docs/contracts/schemas/
            // transliteration-rules.schema.json. This covers required fields,
            // additionalProperties, and per-entry shape only — it is NOT a
            // substitute for validateRuleTable() below, which is the
            // authoritative check for ordering/dedup that JSON Schema cannot
            // express across sibling array items.
            const errors = [];
            const allowedTopLevel = new Set(["language", "escapeChar", "rules"]);
            const allowedRuleKeys = new Set(["input", "output"]);

            if (typeof data !== "object" || data === null || Array.isArray(data)) {
              errors.push("root: must be an object");
            } else {
              for (const key of Object.keys(data)) {
                if (!allowedTopLevel.has(key)) {
                  errors.push(`root: unexpected property "${key}" (additionalProperties: false)`);
                }
              }
              if (typeof data.language !== "string" || data.language.length === 0) {
                errors.push(`"language" must be a non-empty string`);
              }
              if (
                data.escapeChar !== undefined &&
                (typeof data.escapeChar !== "string" || data.escapeChar.length !== 1)
              ) {
                errors.push(`"escapeChar" must be a single character string when present`);
              }
              if (!Array.isArray(data.rules) || data.rules.length === 0) {
                errors.push(`"rules" must be a non-empty array`);
              } else {
                data.rules.forEach((rule, index) => {
                  const label = `rules[${index}]`;
                  if (typeof rule !== "object" || rule === null || Array.isArray(rule)) {
                    errors.push(`${label}: must be an object`);
                    return;
                  }
                  for (const key of Object.keys(rule)) {
                    if (!allowedRuleKeys.has(key)) {
                      errors.push(`${label}: unexpected property "${key}" (additionalProperties: false)`);
                    }
                  }
                  if (typeof rule.input !== "string" || rule.input.length === 0) {
                    errors.push(`${label}: "input" must be a non-empty string`);
                  }
                  if (typeof rule.output !== "string" || rule.output.length === 0) {
                    errors.push(`${label}: "output" must be a non-empty string`);
                  }
                });
              }
            }

            if (errors.length > 0) {
              console.error("Structural (JSON Schema) violations in " + path + ":");
              for (const e of errors) console.error("  " + e);
              process.exit(1);
            }
            console.log("Structural check passed.");

            // --- (b) Authoritative ordering/dedup check via rarelang-server'"'"'s
            // own validateRuleTable().
            import("./rarelang-server-tooling/src/transliteration.mjs").then(({ validateRuleTable }) => {
              const violations = validateRuleTable(data.rules);
              if (violations.length > 0) {
                console.error("validateRuleTable() violations in " + path + ":");
                for (const v of violations) console.error("  " + v);
                process.exit(1);
              }
              console.log("validateRuleTable() passed.");
            });
          '

  contracts-discovery:
    name: contracts-discovery (deterministic)
    needs: fetch-rarelang-server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Restore rarelang-server tooling
        uses: actions/cache/restore@v4
        with:
          path: rarelang-server-tooling
          key: ${{ needs.fetch-rarelang-server.outputs.cache-key }}
          fail-on-cache-miss: true

      # Deterministic half of "dynamically discover new/changed contracts"
      # (rarelang-server#53, this repo's #204): a plain sha256 diff between
      # rarelang-server's current contract docs and the hashes we last
      # reviewed (contracts.lock.json). No LLM needed to notice a contract
      # doc changed — only reviewing *what* changed is a human/agentic call.
      - name: Diff upstream contracts against contracts.lock.json
        run: |
          node rarelang-server-tooling/scripts/contracts-manifest.mjs > /tmp/upstream-manifest.json
          node -e '
            const fs = require("node:fs");
            const upstream = JSON.parse(fs.readFileSync("/tmp/upstream-manifest.json", "utf-8"));
            const lock = JSON.parse(fs.readFileSync("contracts.lock.json", "utf-8"));
            const docs = Object.keys(upstream);
            const drift = docs.filter((doc) => lock[doc]?.hash !== upstream[doc].hash);
            if (drift.length > 0) {
              console.error("Upstream rarelang-server contract doc(s) changed since contracts.lock.json was last reviewed:");
              for (const doc of drift) {
                const lockedVersion = lock[doc]?.version ?? "(missing)";
                const lockedHash = lock[doc]?.hash ?? "(missing)";
                console.error(`  ${doc}: locked=${lockedVersion} (${lockedHash}) upstream=${upstream[doc].version} (${upstream[doc].hash})`);
              }
              console.error("\nReview the change at https://github.com/VITAL-Development/rarelang-server/blob/main/" + drift[0] + ", then update contracts.lock.json to match.");
              process.exit(1);
            }
            console.log("contracts.lock.json is up to date with rarelang-server main.");
          '

  advisory-contract-review:
    name: advisory-contract-review (agentic, non-blocking)
    needs: fetch-rarelang-server
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cost control: only run the agent when a PR actually touches content
      # or the lesson plan — most PRs (CI/docs/tooling) don't, and should
      # cost zero tokens. No full-repo scan either way.
      - name: List changed content/lesson-plan files
        id: changed
        run: |
          files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'content/sarnami/**' 'authored_docs/lesson-plan.md' 'authored_docs/**')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore rarelang-server tooling
        if: steps.changed.outputs.any == 'true'
        uses: actions/cache/restore@v4
        with:
          path: rarelang-server-tooling
          key: ${{ needs.fetch-rarelang-server.outputs.cache-key }}
          fail-on-cache-miss: true

      # Advisory-only half of the Option C fork (rarelang-server#53, #204):
      # the two contracts here are prose/judgment calls that aren't
      # schema-shaped — CEFR-tier correctness of a unit's `cefrLevel`, and
      # the A2-readability ceiling on Dutch authoring text — so they're left
      # to a single, tightly-scoped agentic pass instead of the deterministic
      # validate-content job. Cost controls: gated to run only when content
      # changed (above), reads only the changed files listed above plus the
      # two contract docs (no repo-wide search), single attempt (no retry
      # loop), findings below 70% confidence are not reported, and the job
      # never fails the check — it's advisory, posted as a PR comment only.
      - name: Run Claude Code advisory review
        id: claude_advisory
        if: steps.changed.outputs.any == 'true'
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are doing a single-pass advisory review. Do not search the repository
            or use any tool beyond reading the specific files listed below — this is a
            cost-bounded check, not an open-ended audit.

            Read only:
            - The changed files from this PR: ${{ steps.changed.outputs.files }}
            - rarelang-server-tooling/docs/contracts/lesson-plan-authoring-contract.md (CEFR tier rules, cefrLevel field)
            - rarelang-server-tooling/docs/contracts/source-language-authoring-contract.md (A2 ceiling on Dutch authoring text)

            Evaluate the changed files against those two contracts only:
            1. If a unit sets `cefrLevel`, does its actual vocab/grammar difficulty plausibly
               match that CEFR tier (per the tier table in the lesson-plan contract)?
            2. Is Dutch authoring text (unit/lesson descriptions, notes, exercise prompts —
               not the target-language content itself) written at CEFR A2 level or simpler
               (short sentences, common vocabulary, minimal subordination)?

            For each candidate issue, assign yourself a confidence 0-100. Only report
            findings with confidence >= 70.

            Post exactly ONE new PR comment on every run, so a reader can always tell the
            review actually ran on the latest commit instead of wondering why nothing showed
            up or whether they're looking at a stale result from an earlier push:
            - If you have findings at or above that bar, list each with: the file, a
              one-sentence description, your confidence, and which contract it concerns.
            - Otherwise (no qualifying findings, or none of the changed files are relevant
              to these two contracts), post a single short line saying so, e.g. "Advisory
              contract review: no issues found above the 70% confidence bar."
            Make clear in the comment that this is an advisory, non-blocking review. Always
            post a genuinely new comment — never edit or reuse a previous comment — so the
            PR's comment history shows one advisory result per commit.
            Post it by running `gh pr comment ${{ github.event.pull_request.number }} --body "..."`
            — that's the only Bash command you're allowed to run.
          claude_args: "--max-turns 15 --allowed-tools \"Read\" \"Bash(gh pr comment:*)\""

      # Fallback for when the step above ran (condition was true) but never
      # got as far as posting a comment — e.g. GitHub's OIDC token exchange
      # for claude-code-action refuses to authenticate when a PR's workflow
      # file differs from the version committed on the default branch (a
      # guard against a PR editing its own workflow to exfiltrate
      # CLAUDE_CODE_OAUTH_TOKEN), which silently no-ops the step on any PR
      # that touches this very file. Without this, a run that didn't post
      # looked to a reader like the check had silently failed or hadn't run
      # at all on the latest commit. `execution_file` is only set once
      # Claude actually runs (see anthropics/claude-code-action's run.ts), so
      # its absence — combined with the step not failing outright — is the
      # signal something upstream of the review itself went wrong.
      - name: Report advisory review if it didn't post
        if: |
          always() &&
          steps.changed.outputs.any == 'true' &&
          (steps.claude_advisory.outcome == 'failure' || steps.claude_advisory.outputs.execution_file == '')
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          OUTCOME: ${{ steps.claude_advisory.outcome }}
        run: |
          if [ "$OUTCOME" = "failure" ]; then
            body="**Advisory contract review didn't post a comment.**"$'\n\n'"The \`Run Claude Code advisory review\` step failed outright (non-blocking — this doesn't affect merge status). See the [workflow run]($RUN_URL) for the error."
          else
            body="**Advisory contract review didn't post a comment.**"$'\n\n'"The step completed without producing one, most likely because this PR modifies \`.github/workflows/validate-content.yml\` itself: GitHub's OIDC token exchange for \`claude-code-action\` refuses to authenticate when a PR's workflow file differs from the version committed on the default branch (\`main\`) — a guard against a PR altering its own workflow to exfiltrate \`CLAUDE_CODE_OAUTH_TOKEN\`. This is expected and resolves once this workflow file on \`main\` matches; it does not indicate a problem with this PR's content changes. See the [workflow run]($RUN_URL) for details."
          fi
          gh pr comment "${{ github.event.pull_request.number }}" --body "$body"

  extract-verified-sentences:
    name: extract-verified-sentences (finalized reviews only)
    needs: fetch-rarelang-server
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      # Trigger for this whole job: a sentence-drafts/*.review.md changed in this PR AND its
      # `Status:` line reads FINALIZED (see sentence-drafts/README.md). Every push before that —
      # generation, verification, partial ticking — is a no-op here; the FINALIZED line is the
      # reviewer's explicit, one-time signal that review is actually done, not an inferred guess
      # from which lines changed.
      - name: List finalized review files
        id: finalized
        run: |
          files=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'sentence-drafts/*.review.md')
          finalized=""
          for f in $files; do
            if grep -qx "Status: FINALIZED" "$f"; then
              finalized="$finalized $f"
            fi
          done
          finalized="${finalized# }"
          echo "files=$finalized" >> "$GITHUB_OUTPUT"
          if [ -z "$finalized" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.finalized.outputs.any == 'true'
        with:
          node-version: "22"

      - name: Restore rarelang-server tooling
        if: steps.finalized.outputs.any == 'true'
        uses: actions/cache/restore@v4
        with:
          path: rarelang-server-tooling
          key: ${{ needs.fetch-rarelang-server.outputs.cache-key }}
          fail-on-cache-miss: true

      - name: Run extractor for finalized units
        if: steps.finalized.outputs.any == 'true'
        run: |
          for f in ${{ steps.finalized.outputs.files }}; do
            unit=$(basename "$f" .review.md)
            node scripts/extract-verified-sentences.mjs --unit "$unit"
          done

      # Same deterministic gate every PR already goes through in the validate-content job above —
      # reused here so generated content is held to the exact same contract as hand-authored
      # content. Nothing is committed if this fails.
      - name: Validate content contract
        if: steps.finalized.outputs.any == 'true'
        run: node rarelang-server-tooling/scripts/validate-content.mjs .

      # Same-repo PRs: commit the generated content/sarnami/** diff straight back onto this PR's
      # own branch, so the reviewed checklist and its extracted JSON land in one merge. Safe to
      # run on every push once FINALIZED — the extractor is idempotent, and this step no-ops if
      # there's nothing new to commit.
      - name: Commit extracted content back to this PR
        if: steps.finalized.outputs.any == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/sarnami
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Extract verified sentences [bot]"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          fi

      # Fork PRs: GITHUB_TOKEN can't push back to a fork's branch, so hand off to a maintainer
      # instead of silently doing nothing. The issue is the actionable item; closing it is the
      # maintainer's job once they push the extracted content (e.g. with "Closes #<n>" on that
      # commit/PR), per this repo's usual issue/PR-linking convention.
      - name: Open follow-up issue for fork PR
        if: steps.finalized.outputs.any == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          FINALIZED_FILES: ${{ steps.finalized.outputs.files }}
        run: |
          cat > /tmp/issue-body.md <<EOF
          Review finalized (\`Status: FINALIZED\`) on a fork PR -- \`GITHUB_TOKEN\` can't push back to a fork's branch, so extraction needs to be run manually.
          Related to #${PR_NUMBER}
          - [ ] Run \`node scripts/extract-verified-sentences.mjs --unit <unit-id>\` locally against the PR branch, for each finalized file below
          - [ ] Validate with \`node rarelang-server-tooling/scripts/validate-content.mjs .\`
          - [ ] Push the result (to the PR branch, or a follow-up commit) and include "Closes #<this-issue-number>" so this issue auto-closes
          Finalized files: ${FINALIZED_FILES}
          EOF
          issue_url=$(gh issue create --repo "${{ github.repository }}" --title "Extract sentences from PR #${PR_NUMBER} (fork, needs maintainer)" --body-file /tmp/issue-body.md)
          gh pr comment "${PR_NUMBER}" --body "Review finalized. This PR is from a fork, so I can't push the extracted content myself -- opened $issue_url for a maintainer to run it manually."
